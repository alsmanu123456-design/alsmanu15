<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="description" content="تحميل تطبيق Multi Browser للأندرويد" />
    <title>تحميل Multi Browser</title>
    <style>
      :root {
        color-scheme: dark;
        --background: #0b1220;
        --surface: #162033;
        --text: #f8fafc;
        --muted: #94a3b8;
        --brand: #22c55e;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--background);
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 420px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        padding: 40px 24px;
        border: 1px solid #26344d;
        border-radius: 24px;
        background: var(--surface);
        text-align: center;
      }

      .logo {
        width: 72px;
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 20px;
        background: var(--brand);
        color: var(--background);
        font-size: 34px;
        font-weight: 800;
      }

      .copy {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      h1 { margin: 0; font-size: 28px; line-height: 1.4; }
      p { margin: 0; color: var(--muted); font-size: 16px; line-height: 1.6; }

      .download {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 54px;
        border-radius: 14px;
        background: var(--brand);
        color: var(--background);
        font-size: 17px;
        font-weight: 800;
        text-decoration: none;
      }

      .download:focus-visible {
        outline: 3px solid var(--text);
        outline-offset: 4px;
      }

      small { color: var(--muted); font-size: 14px; }
    </style>
  </head>
  <body>
    <main>
      <div class="logo" aria-hidden="true">M</div>
      <div class="copy">
        <h1>Multi Browser</h1>
        <p>حمّل التطبيق وثبّته مباشرة على جهاز Android.</p>
      </div>
      <a class="download" href="./Multi-Browser.apk" download>تحميل التطبيق APK</a>
      <small>الإصدار 1.0.0 · Android 8 أو أحدث</small>
    </main>
  </body>
</html>
